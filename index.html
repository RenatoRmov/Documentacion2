    <style>
      :root {
        --brand-accent: #C29329; /* Dorado Metálico Refinado */
        --brand-accent-soft: rgba(194, 147, 41, 0.1);
        --bg-main: #111418; /* Grafito Profundo */
        --bg-sidebar: #0A0C0E; /* Negro Tecnológico */
        --bg-surface: #1B1F24; /* Gris Carbón */
        --border-color: rgba(255, 255, 255, 0.05);
        --text-muted: #6B7280;
      }
      body {
        font-family: 'Plus Jakarta Sans', sans-serif;
        background-color: var(--bg-main);
        color: #E2E8F0;
        -webkit-font-smoothing: antialiased;
      }
      .custom-scrollbar::-webkit-scrollbar {
        width: 3px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: transparent;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #2D333B;
        border-radius: 10px;
      }
      .glass-panel {
        background: var(--bg-surface);
        border: 1px solid var(--border-color);
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      }
      .brand-gradient {
        background: linear-gradient(135deg, #E3B341 0%, #C29329 100%);
      }
      .btn-premium {
        background: linear-gradient(135deg, #E3B341 0%, #C29329 100%);
        color: #0A0C0E;
        box-shadow: 0 4px 20px rgba(194, 147, 41, 0.15);
        transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      }
      .btn-premium:hover {
        transform: translateY(-1px);
        box-shadow: 0 8px 30px rgba(194, 147, 41, 0.25);
        filter: brightness(1.05);
      }
      .btn-secondary {
        background: rgba(255, 255, 255, 0.02);
        border: 1px solid rgba(255, 255, 255, 0.06);
        color: #A1A1AA;
        transition: all 0.3s ease;
      }
      .btn-secondary:hover {
        background: rgba(255, 255, 255, 0.05);
        color: white;
        border-color: var(--brand-accent);
      }
      .tech-border {
        border: 1px solid var(--border-color);
      }
      .glow-amber {
        box-shadow: 0 0 15px rgba(194, 147, 41, 0.1);
      }
    </style>
